<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="stile.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap">
    <title>Space War</title>

</head>

<body>
    <div class="perdita">
        <h1 class="lose">GAME OVER!</h1>
    </div>

    <div class="vittoria">
        <h1 class="win">
            Vittoria!!
        </h1>
    </div>
    
    
    
    
    <div class="container">
        <div class="schermata_iniziale">
            <div class="gioco">
                <h1>Space War</h1>
                <h3>La guerra più spaziale di sempre!</h3>
            </div>

            <div class="nome">
                <input type="text" placeholder="Inserisci il tuo nome">
            </div>
            <button class="bottone">Combatti</button>
            
            <div class="comandi">
                <div class="muovi">
                    <h1>
                        Muovi
                    </h1>
                </div>

                <div class="spara">
                    <h1>
                        Spara
                    </h1>
                </div>
            </div>
            
            
            <div class="tasti">
                
                <div class="sinistra">
                    <h2>
                        ←
                    </h2>
                </div>
                <div class="destra">
                    <h2>
                        →
                    </h2>
                </div>

                <div class="spazio">
                    <h2>
                        "Space"
                    </h2>
                </div>
            </div>

        </div>

        
    </div>

    <div class="luna">
        <div class="b"></div>
        <div class="p"></div>
    </div>

    <div id="sfondo"></div>
    
    <div id="navicella">
        <img src="img/navicella.png" alt="navicella">
    </div>
    <p id="vite"></p>
    <p id="punteggio"></p>
    <p id="utente"></p>

    
    <script src="script.js"></script>

</body>
</html>
